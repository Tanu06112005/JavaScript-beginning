// prevent default:- if we want to prevent the default action of an element we can use preventDefault method

 document.getElementById('google').addEventListener('click', function(e){
    e.preventDefault();  
}, false);

// after mentioning this it will nit direct to the google page and stay at the same page as it was
// in short the next action of the function of the element (here directiong to the google site is restricted) is prevented by using preventDefault method

//-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
// removing the event listener:- if we want to remove the event listener we can use removeEventListener method which takes the same parameters as addEventListener method

document.querySelector('#images').addEventListener('click', function(e){
    console.log(e);// it shows that e is a Pointer event 
    console.log(e.target); // it shows the target element which is clicked
    console.log(e.currentTarget); // it shows the current target element which is clicked
    console.log(e.target.currentTarget); // it shows the current target element which is clicked
    console.log(e.target.parentElement); // it shows the parent element of the target element which is clicked  
    console.log(e.target.className); // it shows the class name of the target element which is clicked
    console.log(e.target.id); // it shows the id of the target element which is clicked
    console.log(e.target.innerHTML); // it shows the innerHTML of the target element which is clicked
    console.log(e.target.innerText); // it shows the innerText of the target element which  is clicked      
    console.log(e.target.parentNode); // it shows the parent node of the target element which is clicked
});
