<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changing Colour of the page with the help of start stop buttons</title>
    <style>
        .body{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        .container{
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
             height: 100vh;
            width: 100vw;
             /* background-color: #0e0e0e; */
            
           
        }
         .main-box{
            padding:1rem;
            color:aliceblue;
            text-align: center;
            height: 30%;
            width: 35%;
            background-image: linear-gradient(to right,rgba(4, 13, 41, 0.9),rgba(12, 50, 177, 0.7));
            border-radius: 1rem;
           
        }
        button{
            width:5rem;
            height: 2rem;
            cursor: pointer;
        }
        h1{
            max-width: 100%;
        }
    </style>
</head>
<body>
    
     <div class="container">
        <div class="main-box">
            <h1>Changing Colour of the page with the help of start stop buttons</h1>
            <button id="start">START</button>
             <button id="stop">STOP</button>
        </div>


    <script>

        const randomColor=function(){
            const hex="0123456789ABCDEF";
            let color="#";
            for(let i=0;i<6;i++){
                color+=hex[Math.floor(Math.random()*16)];
            }
            return color;
        };

        function changeBgColor(){
            document.querySelector(".container").style.backgroundColor=randomColor();
        }

        let ref;
        const StartChangingColor=function(){
            if(!ref)
            {ref=setInterval(changeBgColor,1000);}
            
        //     function changeBgColor(){
        //     document.querySelector(".container").style.backgroundColor=randomColor();
        // }  both inside and outside works
        }
        const StopChangingColor=function(){
            clearInterval(ref);
            ref=null;
        }

        document.querySelector('#start').addEventListener('click',StartChangingColor);


        document.querySelector('#stop').addEventListener('click',StopChangingColor);
            

    </script>

</body>
</html>
